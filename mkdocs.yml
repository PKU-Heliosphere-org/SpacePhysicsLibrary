site_name: SpacePhysicsLibrary
site_description: Space physics knowledge base built with MkDocs Material.
site_url: https://pku-heliosphere-org.github.io/SpacePhysicsLibrary/
repo_url: https://github.com/PKU-Heliosphere-org/SpacePhysicsLibrary
repo_name: PKU-Heliosphere-org/SpacePhysicsLibrary

theme:
  name: material
  language: zh
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 基础理论:
      - 磁流体力学: theory/mhd.md
      - 线性等离子体理论: theory/linear-plasma.md
      - 准线性理论:
          - 概览: theory/quasi-linear.md
          - 等离子体动理学理论:
              - 准线性理论与共振扩散方程: theory/等离子体动理学理论/等离子体动理学的准线性理论/准线性理论与共振扩散方程.md
      - 等离子体不稳定性: theory/instability.md
  - 探测技术:
      - 原位磁场探测: observation/mag-detect.md
      - 原位粒子探测: observation/particle-detect.md
  - 数值模拟方法:
      - MHD数值求解: numeric/mhd-solver.md
      - MHD数值模拟:
          - 特征线方法模拟:
              - 磁流体力学的特征线方法介绍: numeric/MHD-simulation/MOC-simulation/磁流体力学的特征线方法与RH关系介绍/磁流体力学的特征线方法介绍.md
              - 特征线方法与RH关系模拟MHD扰动传播与激波形成演化: numeric/MHD-simulation/MOC-simulation/磁流体力学的特征线方法与RH关系介绍/特征线方法与RH关系模拟MHD扰动传播与激波形成演化.md
      - 粒子模拟PIC: numeric/pic.md
